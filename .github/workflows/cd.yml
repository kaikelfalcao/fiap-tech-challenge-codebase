name: CD

on:
  push:
    branches:
      - develop
      - main

concurrency:
  group: cd-${{ github.ref_name }}
  cancel-in-progress: false

env:
  DOCKER_IMAGE: kaikelfalcao/tech-challenge-api-fase-2
  TF_STATE_BUCKET: fiap-tech-challenge-tfstate-fase3-matheus
  AWS_REGION: us-east-1

jobs:
  test:
    name: Test & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --if-present

      - name: Build
        run: npm run build

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: test
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: set-tag
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "image_tag=prod-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "extra_tag=prod-latest" >> $GITHUB_OUTPUT
          else
            echo "image_tag=staging-${SHORT_SHA}" >> $GITHUB_OUTPUT
            echo "extra_tag=staging-latest" >> $GITHUB_OUTPUT
          fi

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Build and push Docker image
        run: |
          IMAGE_TAG=${{ steps.set-tag.outputs.image_tag }}
          EXTRA_TAG=${{ steps.set-tag.outputs.extra_tag }}

          docker build \
            -t ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG} \
            -t ${{ env.DOCKER_IMAGE }}:${EXTRA_TAG} \
            .

          docker push ${{ env.DOCKER_IMAGE }}:${IMAGE_TAG}
          docker push ${{ env.DOCKER_IMAGE }}:${EXTRA_TAG}

  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Read Terraform state — K8s infra
        id: k8s-state
        run: |
          aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/k8s-infra/terraform.tfstate k8s-state.json
          CLUSTER_NAME=$(jq -r '.outputs.cluster_name.value' k8s-state.json)
          echo "cluster_name=${CLUSTER_NAME}" >> $GITHUB_OUTPUT

 
      - name: Read Terraform state — DB infra
        id: db-state
        run: |
          aws s3 cp s3://${{ env.TF_STATE_BUCKET }}/db-infra/terraform.tfstate db-state.json
          DB_HOST=$(jq -r '.outputs.db_address.value' db-state.json)
          DB_PORT=$(jq -r '.outputs.db_port.value' db-state.json)
          DB_NAME=$(jq -r '.outputs.db_name.value' db-state.json)
          DB_USER=$(jq -r '.outputs.db_username.value' db-state.json)
          echo "db_host=${DB_HOST}" >> $GITHUB_OUTPUT
          echo "db_port=${DB_PORT}" >> $GITHUB_OUTPUT
          echo "db_name=${DB_NAME}" >> $GITHUB_OUTPUT
          echo "db_user=${DB_USER}" >> $GITHUB_OUTPUT

      - name: Configure kubectl
        run: |
          aws eks update-kubeconfig \
            --region ${{ env.AWS_REGION }} \
            --name ${{ steps.k8s-state.outputs.cluster_name }}

      - name: Set deployment environment
        id: env-config
        run: |
          if [[ "${{ github.ref_name }}" == "main" ]]; then
            echo "node_env=production" >> $GITHUB_OUTPUT
          else
            echo "node_env=staging" >> $GITHUB_OUTPUT
          fi


      - name: Deploy via Helm
        run: |
          helm upgrade --install tech-challenge ./helm/tech-challenge \
            --namespace default \
            --set app.image.tag=${{ needs.docker.outputs.image_tag }} \
            --set app.image.pullPolicy=Always \
            --set env.DATABASE_HOST=${{ steps.db-state.outputs.db_host }} \
            --set "env.DATABASE_PORT=${{ steps.db-state.outputs.db_port }}" \
            --set env.DATABASE_NAME=${{ steps.db-state.outputs.db_name }} \
            --set env.DATABASE_USER=${{ steps.db-state.outputs.db_user }} \
            --set env.NODE_ENV=${{ steps.env-config.outputs.node_env }} \
            --set "secrets.DATABASE_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" \
            --set "secrets.POSTGRES_PASSWORD=${{ secrets.DATABASE_PASSWORD }}" \
            --set "secrets.JWT_SECRET=${{ secrets.JWT_SECRET }}" \
            --set postgres.enabled=false \
            --wait \
            --timeout 5m
