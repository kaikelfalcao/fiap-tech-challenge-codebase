name: CI/CD

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  ci:
    name: Lint + Format + Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 'lts'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check format
        run: npm run format:check

      - name: Run tests
        run: npm run test

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_PASSWORD }}

      - name: Extract tag
        run: echo "TAG=${GITHUB_REF#refs/tags/}" >> $GITHUB_ENV

      - name: Build image
        run: |
          docker build \
            -t kaikelfalcao/autoflow:$TAG \
            -t kaikelfalcao/autoflow:latest \
            .

      - name: Push image
        run: |
          docker push kaikelfalcao/autoflow:$TAG
          docker push kaikelfalcao/autoflow:latest
