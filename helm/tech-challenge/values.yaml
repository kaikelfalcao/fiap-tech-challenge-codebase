# =========================
# Configurações da API
# =========================
app:
  name: tech-challenge-api
  image:
    repository: kaikelfalcao/tech-challenge-api-fase-2
    tag: latest 
    pullPolicy: IfNotPresent
  replicas: 2
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 300m
      memory: 256Mi

service:
  type: NodePort
  port: 3000
  nodePort: 30000

probes:
  readiness:
    path: /api/health
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 5
    failureThreshold: 3

  liveness:
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 2
    failureThreshold: 3

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "256Mi"

env:
  POSTGRES_HOST: postgres
  POSTGRES_PORT: "5432"
  POSTGRES_DB: app
  POSTGRES_USER: app
  APP_PORT: "3000"
  NODE_ENV: development
  JWT_EXPIRES_IN: 1d

secrets:
  POSTGRES_PASSWORD: app
  JWT_SECRET: tech-challenge

# =========================
# Configurações do Postgres
# =========================
postgres:
  name: postgres

  image:
    repository: postgres
    tag: "16"

  port: 5432

  database: app
  user: app
  password: app

  persistence:
    enabled: true
    size: 1Gi

hpa:
  enabled: false

# =========================
# Configurações globais
# =========================
global:
  namespace: default

