apiVersion: apps/v1
kind: Deployment
metadata:
  name: autoflow
  namespace: autoflow
  labels:
    app: autoflow
spec:
  replicas: 2
  selector:
    matchLabels:
      app: autoflow
  template:
    metadata:
      labels:
        app: autoflow
      annotations:
        newrelic.com/inject: 'true'
    spec:
      containers:
        - name: autoflow
          image: kaikelfalcao/autoflow:latest
          ports:
            - containerPort: 3000
          envFrom:
            - secretRef:
                name: autoflow-secrets
          resources:
            requests:
              cpu: 250m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          livenessProbe:
            httpGet:
              path: /api/health/liveness
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/health/readiness
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
