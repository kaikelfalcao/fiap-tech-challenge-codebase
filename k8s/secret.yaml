# ATENÇÃO: Este arquivo é um TEMPLATE — não contém valores reais.
#
# O pipeline (ci-cd.yml) cria o secret diretamente via:
#   kubectl create secret generic autoflow-secrets --dry-run=client | kubectl apply
# lendo DB_HOST/DB_PASS do S3 tfstate e JWT_SECRET/NEWRELIC do GitHub secrets.
#
# Para uso LOCAL, execute: ./scripts/local-deploy.sh
# Ele gera e aplica o secret automaticamente a partir do S3 tfstate.
#
# Se precisar inspecionar o secret no cluster:
#   kubectl get secret autoflow-secrets -n autoflow -o jsonpath='{.data}' | base64 -d
apiVersion: v1
kind: Secret
metadata:
  name: autoflow-secrets
  namespace: autoflow
type: Opaque
stringData:
  NODE_ENV: production
  DB_HOST: "<lido do db-infra/terraform.tfstate via S3>"
  DB_PORT: "5432"
  DB_USER: "<lido do db-infra/terraform.tfstate via S3>"
  DB_PASS: "<lido do db-infra/terraform.tfstate via S3>"
  DB_NAME: "<lido do db-infra/terraform.tfstate via S3>"
  JWT_SECRET: "<GitHub secret JWT_SECRET>"
  JWT_EXPIRES_IN: 1d
  NEW_RELIC_ENABLED: "true"
  NEW_RELIC_APP_NAME: autoflow-tc
  NEW_RELIC_LICENSE_KEY: "<GitHub secret NEWRELIC_LICENSE_KEY>"
  NEW_RELIC_LOG_LEVEL: info
